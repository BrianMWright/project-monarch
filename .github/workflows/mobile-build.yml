# mobile-build.yml
# Builds a signed Android .apk on every push to main.
#
# The barichello/godot-ci image ships Android build-tools 33.0.2.
# Godot 4.6 requires build-tools 35.0.1 (and the Godot docs explicitly warn
# against distro-packaged Android SDKs on Linux). We install a clean SDK at
# /opt/android-sdk with the exact packages Godot 4.6 expects, ignoring
# anything the container ships.
#
# ── Required GitHub Secrets ────────────────────────────────────────────────
#
#  ANDROID_KEYSTORE_BASE64   base64-encoded release keystore
#                            Generate: base64 -i release.keystore | pbcopy
#  ANDROID_KEY_ALIAS         key alias inside the keystore
#  ANDROID_KEY_PASS          key + keystore password
#
# ── One-time local setup ───────────────────────────────────────────────────
#  1. Godot editor → Project → Export → Android preset,
#     bundle ID = com.monarchgame.app, save (updates export_presets.cfg).
#  2. Generate a release keystore:
#     keytool -genkey -v -keystore release.keystore -alias monarch \
#       -keyalg RSA -keysize 2048 -validity 10000
#  3. Add the three ANDROID_ secrets to:
#     GitHub repo → Settings → Secrets and variables → Actions.

name: Mobile Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6"
  PROJECT_PATH: src/monarch-game
  # Clean SDK path — deliberately separate from whatever the image ships.
  ANDROID_SDK_ROOT: /opt/android-sdk

jobs:
  build-android:
    name: Android (.apk)
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ── System libraries ──────────────────────────────────────────────────
      - name: Install system libraries
        run: |
          apt-get update -qq
          apt-get install -y \
            libfontconfig1 \
            libxcursor1 \
            libxinerama1 \
            libxi6 \
            libvulkan1 \
            python3 \
            unzip \
            wget \
            libxrandr-dev || apt-get install -y libxrandr2

      # ── Fresh Android SDK ─────────────────────────────────────────────────
      # Installs the exact packages Godot 4.6 requires:
      #   build-tools 35.0.1, platforms;android-35, platform-tools,
      #   CMake 3.10.2.4988404, NDK r28b (28.1.13356709)
      #
      # NOTE: NDK r28b is ~2 GB; this step takes several minutes.
      # If build time is a concern and your project has no GDExtension
      # native code, you can drop the ndk line — it is only strictly required
      # for Gradle builds with C++ plugins.
      - name: Install Android SDK
        run: |
          SDK="${ANDROID_SDK_ROOT}"
          mkdir -p "${SDK}/cmdline-tools"

          # Download Android command-line tools (build 11076708 = tools 11.0).
          # Update this version number when Google releases a newer build.
          wget -q \
            "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
            -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-extract
          # The zip unpacks a single "cmdline-tools/" directory; place it at
          # cmdline-tools/latest so sdkmanager resolves packages correctly.
          mv /tmp/cmdline-tools-extract/cmdline-tools "${SDK}/cmdline-tools/latest"

          SDKMANAGER="${SDK}/cmdline-tools/latest/bin/sdkmanager"

          # Pre-accept all licenses (two methods for reliability).
          mkdir -p "${SDK}/licenses"
          printf '%s\n' \
            '24333f8a63b6825ea9c5514f83c2829b004d1fee' \
            > "${SDK}/licenses/android-sdk-license"
          printf '%s\n' \
            '84831b9409646a918e30573bab4c9c91346d8abd' \
            > "${SDK}/licenses/android-sdk-preview-license"
          yes | "${SDKMANAGER}" --licenses > /dev/null 2>&1 || true

          # Install exact packages required by Godot 4.6.
          "${SDKMANAGER}" \
            "build-tools;35.0.1" \
            "platforms;android-35" \
            "platform-tools" \
            "cmake;3.10.2.4988404" \
            "ndk;28.1.13356709"

          echo "=== Installed SDK layout ==="
          ls "${SDK}/build-tools/"
          ls -l "${SDK}/platform-tools/adb"

          # Persist for all downstream steps.
          echo "ANDROID_SDK_ROOT=${SDK}" >> "${GITHUB_ENV}"

      # ── Export templates ──────────────────────────────────────────────────
      # $HOME inside a GitHub Actions container is /github/home, not /root.
      # Download fresh templates into the real $HOME so Godot finds them.
      - name: Install export templates
        run: |
          TEMPLATES_DIR="${HOME}/.local/share/godot/export_templates/4.6.stable"
          mkdir -p "${TEMPLATES_DIR}"
          wget -q \
            "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz" \
            -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates_extract
          mv /tmp/templates_extract/templates/* "${TEMPLATES_DIR}/"
          echo "Android templates installed:"
          ls "${TEMPLATES_DIR}/" | grep android

      # ── Godot editor settings ─────────────────────────────────────────────
      - name: Write Godot editor settings
        run: |
          SDK="${ANDROID_SDK_ROOT}"
          JAVA_PATH="$(readlink -f "$(which java)" | sed 's|/bin/java||')"
          DEBUG_KS="${HOME}/.android/debug.keystore"

          mkdir -p "${HOME}/.config/godot"
          {
            printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\n'
            printf 'export/android/android_sdk_path = "%s"\n' "${SDK}"
            printf 'export/android/java_sdk_path = "%s"\n'    "${JAVA_PATH}"
            printf 'export/android/debug_keystore = "%s"\n'   "${DEBUG_KS}"
            printf 'export/android/debug_keystore_user = "androiddebugkey"\n'
            printf 'export/android/debug_keystore_pass = "android"\n'
          } > "${HOME}/.config/godot/editor_settings-4.tres"

          echo "=== editor_settings-4.tres ==="
          cat "${HOME}/.config/godot/editor_settings-4.tres"

      - name: Start ADB daemon
        run: |
          ADB="${ANDROID_SDK_ROOT}/platform-tools/adb"
          echo "Starting ADB: ${ADB}"
          "${ADB}" start-server

      # ── Keystore ──────────────────────────────────────────────────────────
      # Written to /tmp so Godot resolves it via an absolute path.
      # res://release.keystore is unreliable inside Docker containers because
      # res:// is relative to --path which may differ from the write CWD.
      - name: Write and verify release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
            | base64 --decode > /tmp/release.keystore
          keytool -list \
            -keystore /tmp/release.keystore \
            -storepass "${{ secrets.ANDROID_KEY_PASS }}" \
            -noprompt
          echo "Keystore OK — $(stat -c%s /tmp/release.keystore) bytes"

      # Python str.replace() handles passwords containing $, !, & — characters
      # that shell-based sed silently mangles when expanded inside double quotes.
      - name: Inject keystore path and credentials
        env:
          _KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          _KEY_PASS:  ${{ secrets.ANDROID_KEY_PASS }}
        run: |
          python3 - <<'PYEOF'
          import os
          cfg    = os.environ['PROJECT_PATH'] + '/export_presets.cfg'
          alias  = os.environ['_KEY_ALIAS']
          passwd = os.environ['_KEY_PASS']
          with open(cfg) as f:
              content = f.read()
          content = content.replace('res://release.keystore', '/tmp/release.keystore')
          content = content.replace('CI_KEY_ALIAS', alias)
          content = content.replace('CI_KEY_PASS',  passwd)
          with open(cfg, 'w') as f:
              f.write(content)
          print("export_presets.cfg patched.")
          PYEOF

          if grep -qE "CI_KEY_ALIAS|CI_KEY_PASS" \
               "${{ env.PROJECT_PATH }}/export_presets.cfg"; then
            echo "ERROR: placeholder not replaced — check ANDROID_KEY_ALIAS / ANDROID_KEY_PASS secrets."
            exit 1
          fi
          echo "=== keystore lines in export_presets.cfg ==="
          grep "keystore/" "${{ env.PROJECT_PATH }}/export_presets.cfg"

      # ── Pre-export diagnostics ────────────────────────────────────────────
      - name: Pre-export diagnostics
        run: |
          echo "=== Android export templates ==="
          ls "${HOME}/.local/share/godot/export_templates/4.6.stable/" \
            | grep -i android

          echo "=== Build-tools versions installed ==="
          ls "${ANDROID_SDK_ROOT}/build-tools/"

          echo "=== apksigner (in build-tools 35.0.1) ==="
          ls -l "${ANDROID_SDK_ROOT}/build-tools/35.0.1/apksigner"

          echo "=== platform-tools/adb ==="
          ls -l "${ANDROID_SDK_ROOT}/platform-tools/adb"

          echo "=== jarsigner ==="
          which jarsigner

          echo "=== /tmp/release.keystore ==="
          ls -l /tmp/release.keystore

          echo "=== export_presets.cfg keystore section ==="
          grep "keystore" "${{ env.PROJECT_PATH }}/export_presets.cfg"

      # ── Export ────────────────────────────────────────────────────────────
      - name: Export Android APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          mkdir -p build/android
          godot -v --headless \
            --path "${{ env.PROJECT_PATH }}" \
            --export-release "Android" \
            "build/android/MonarchGame.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonarchGame-android-apk
          path: build/android/MonarchGame.apk
          retention-days: 30

# ── iOS ───────────────────────────────────────────────────────────────────
# Restore from git history when Apple Developer Program is active.
