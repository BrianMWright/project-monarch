name: "Mobile Build"

on:
  push:
    branches: [ "main" ]

env:
  GODOT_VERSION: "4.6"
  PROJECT_PATH: "src/monarch-game"

jobs:
  export-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget zip unzip libfontconfig1 libxcursor1 libxinerama1 libxrandr2 libxi6 libgl1 libasound2t64 libpulse0 libdbus-1-3 libudev1

      # FORCE JAVA 17 - Very important for Android SDK compatibility on Ubuntu 24.04
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Godot Engine
        run: |
          wget https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip
          unzip Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip
          sudo mv Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Install Godot Export Templates
        run: |
          wget https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          unzip Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          mv ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/
          rm -rf ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/templates

      - name: Create Keystores
        run: |
          # Use -di to ignore newlines/spaces that might be in the secret
          echo "${{ secrets.RAW_KEYSTORE }}" | base64 -di > "${{ github.workspace }}/${{ env.PROJECT_PATH }}/release.keystore"
          
          # Build debug keystore for validation
          keytool -genkey -v -keystore "${{ github.workspace }}/${{ env.PROJECT_PATH }}/debug.keystore" -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
      - name: Export Android APK
        env:
          GODOT_ANDROID_SDK_PATH: ${{ env.ANDROID_HOME }}
        run: |
          mkdir -p build/android
          
          # Force settings again
          godot --headless --path "${{ env.PROJECT_PATH }}" --editor \
            --set-setting "export/android/android_sdk_path" "${{ env.ANDROID_HOME }}" \
            --set-setting "export/android/debug_keystore" "${{ github.workspace }}/${{ env.PROJECT_PATH }}/debug.keystore" \
            --set-setting "export/android/debug_keystore_user" "androiddebugkey" \
            --set-setting "export/android/debug_keystore_pass" "android" \
            --quit
          
          # Actual Export
          # Note: We are using "Android" as the preset name. 
          # Ensure this EXACTLY matches the name in your export_presets.cfg
          godot --headless --verbose \
            --path "${{ env.PROJECT_PATH }}" \
            --export-release "Android" \
            "${{ github.workspace }}/build/android/MonarchGame.apk"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonarchGame-android-apk
          path: build/android/MonarchGame.apk