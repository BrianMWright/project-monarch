# mobile-build.yml
# Builds a signed Android .apk on every push to main.
#
# Uses barichello/godot-ci:4.6 — Godot, Android SDK, and JDK are bundled.
# Export templates are downloaded fresh because GitHub Actions sets $HOME to
# /github/home inside containers, not /root where the image stores them.
#
# ── Required GitHub Secrets ────────────────────────────────────────────────
#
#  ANDROID_KEYSTORE_BASE64   base64-encoded release keystore
#                            Generate: base64 -i release.keystore | pbcopy
#  ANDROID_KEY_ALIAS         key alias inside the keystore
#  ANDROID_KEY_PASS          key + keystore password
#
# ── One-time local setup ───────────────────────────────────────────────────
#  1. Godot editor → Project → Export → Android preset,
#     set bundle ID to com.monarchgame.app, save (updates export_presets.cfg).
#  2. Generate a release keystore:
#     keytool -genkey -v -keystore release.keystore -alias monarch \
#       -keyalg RSA -keysize 2048 -validity 10000
#  3. Add the three ANDROID_ secrets to:
#     GitHub repo → Settings → Secrets and variables → Actions.

name: Mobile Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6"
  PROJECT_PATH: src/monarch-game

jobs:
  build-android:
    name: Android (.apk)
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      # v5 targets Node 24. v4.x targets Node 20, which GitHub is retiring;
      # the deprecated runtime causes git to exit 128 inside containers.
      - name: Checkout
        uses: actions/checkout@v5

      # ── System libraries ─────────────────────────────────────────────────
      # Godot headless needs fontconfig + X11 stubs even with --headless.
      # python3 is used for safe keystore injection (avoids shell
      # special-character expansion that silently breaks sed-based injection).
      - name: Install system libraries
        run: |
          apt-get update -qq
          apt-get install -y \
            libfontconfig1 \
            libxcursor1 \
            libxinerama1 \
            libxi6 \
            libvulkan1 \
            python3 \
            libxrandr-dev || apt-get install -y libxrandr2

      # ── Export templates ─────────────────────────────────────────────────
      # Downloaded fresh into $HOME so Godot and GitHub Actions see the same
      # path. The image's own templates live under /root, which is not $HOME
      # inside a GitHub Actions container job.
      - name: Install export templates
        run: |
          TEMPLATES_DIR="${HOME}/.local/share/godot/export_templates/4.6.stable"
          mkdir -p "${TEMPLATES_DIR}"
          wget -q \
            "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz" \
            -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates_extract
          mv /tmp/templates_extract/templates/* "${TEMPLATES_DIR}/"
          echo "Android templates present:"
          ls "${TEMPLATES_DIR}/" | grep android

      # ── Android SDK discovery and editor settings ─────────────────────────
      # Do not require any specific env var. Probe in order:
      #   1. ANDROID_SDK_ROOT  (some image versions)
      #   2. ANDROID_HOME      (most image versions)
      #   3. adb on PATH       (resolves parent dirs)
      #   4. filesystem search (last resort)
      #
      # The barichello image ships platform-tools as "platform-tools-2".
      # Godot validates the SDK by checking platform-tools/adb, so we create
      # the standard symlink when the canonical directory is missing.
      - name: Configure Android SDK paths
        run: |
          SDK_ROOT=""

          if [ -n "${ANDROID_SDK_ROOT:-}" ]; then
            SDK_ROOT="${ANDROID_SDK_ROOT}"
            echo "Detected SDK_ROOT from ANDROID_SDK_ROOT"
          elif [ -n "${ANDROID_HOME:-}" ]; then
            SDK_ROOT="${ANDROID_HOME}"
            echo "Detected SDK_ROOT from ANDROID_HOME"
          else
            ADB_PATH="$(command -v adb 2>/dev/null || true)"
            if [ -n "${ADB_PATH}" ]; then
              SDK_ROOT="$(dirname "$(dirname "$(readlink -f "${ADB_PATH}")")")"
              echo "Detected SDK_ROOT from adb on PATH (${ADB_PATH})"
            else
              ADB_PATH="$(find /usr /opt /root -maxdepth 6 \
                            -name 'adb' -type f 2>/dev/null | head -1)"
              if [ -n "${ADB_PATH}" ]; then
                SDK_ROOT="$(dirname "$(dirname "${ADB_PATH}")")"
                echo "Detected SDK_ROOT from filesystem search"
              fi
            fi
          fi

          if [ -z "${SDK_ROOT}" ]; then
            echo "ERROR: Cannot detect Android SDK root. No adb found and no SDK env var set."
            exit 1
          fi
          echo "SDK_ROOT=${SDK_ROOT}"

          # Fix inconsistent platform-tools directory name in the image.
          if [ ! -d "${SDK_ROOT}/platform-tools" ]; then
            if [ -d "${SDK_ROOT}/platform-tools-2" ]; then
              echo "Symlinking platform-tools-2 → platform-tools"
              ln -s "${SDK_ROOT}/platform-tools-2" "${SDK_ROOT}/platform-tools"
            else
              echo "WARNING: neither platform-tools nor platform-tools-2 found."
            fi
          fi

          # Confirm adb is reachable at the canonical path.
          ADB="${SDK_ROOT}/platform-tools/adb"
          if [ ! -f "${ADB}" ]; then
            ADB="$(find "${SDK_ROOT}" -name 'adb' -type f 2>/dev/null | head -1)"
          fi
          if [ -z "${ADB}" ]; then
            echo "ERROR: adb not found anywhere under ${SDK_ROOT}"
            exit 1
          fi
          echo "ADB=${ADB}"

          # Resolve the real JDK home (follow symlinks).
          JAVA_PATH="$(readlink -f "$(which java)" | sed 's|/bin/java||')"
          echo "JAVA_PATH=${JAVA_PATH}"

          # Debug keystore — only needed for debug builds, not release.
          DEBUG_KS="$(find /root /github "${HOME}" -name 'debug.keystore' \
                        -type f 2>/dev/null | head -1)"
          DEBUG_KS="${DEBUG_KS:-${HOME}/.android/debug.keystore}"

          # Write editor settings under the real $HOME.
          mkdir -p "${HOME}/.config/godot"
          {
            printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\n'
            printf 'export/android/android_sdk_path = "%s"\n' "${SDK_ROOT}"
            printf 'export/android/java_sdk_path = "%s"\n'    "${JAVA_PATH}"
            printf 'export/android/debug_keystore = "%s"\n'   "${DEBUG_KS}"
            printf 'export/android/debug_keystore_user = "androiddebugkey"\n'
            printf 'export/android/debug_keystore_pass = "android"\n'
          } > "${HOME}/.config/godot/editor_settings-4.tres"

          echo "=== editor_settings-4.tres ==="
          cat "${HOME}/.config/godot/editor_settings-4.tres"

          # Persist for downstream steps.
          printf 'SDK_ROOT=%s\n' "${SDK_ROOT}" >> "${GITHUB_ENV}"
          printf 'ADB=%s\n'      "${ADB}"      >> "${GITHUB_ENV}"

      - name: Start ADB daemon
        run: |
          echo "Starting ADB: ${ADB}"
          "${ADB}" start-server

      # ── Keystore ────────────────────────────────────────────────────────
      # Written to /tmp (absolute path) because res:// resolution is
      # unreliable inside Docker containers when --path is relative.
      - name: Write and verify release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
            | base64 --decode > /tmp/release.keystore
          keytool -list \
            -keystore /tmp/release.keystore \
            -storepass "${{ secrets.ANDROID_KEY_PASS }}" \
            -noprompt
          echo "Keystore OK — $(stat -c%s /tmp/release.keystore) bytes"

      # Python str.replace() handles passwords that contain $, !, & or other
      # characters that shell-based sed would silently mangle.
      - name: Inject keystore path and credentials
        env:
          _KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          _KEY_PASS:  ${{ secrets.ANDROID_KEY_PASS }}
        run: |
          python3 - <<'PYEOF'
          import os
          cfg    = os.environ['PROJECT_PATH'] + '/export_presets.cfg'
          alias  = os.environ['_KEY_ALIAS']
          passwd = os.environ['_KEY_PASS']
          with open(cfg) as f:
              content = f.read()
          content = content.replace('res://release.keystore', '/tmp/release.keystore')
          content = content.replace('CI_KEY_ALIAS', alias)
          content = content.replace('CI_KEY_PASS',  passwd)
          with open(cfg, 'w') as f:
              f.write(content)
          print("export_presets.cfg patched.")
          PYEOF

          if grep -qE "CI_KEY_ALIAS|CI_KEY_PASS" \
               "${{ env.PROJECT_PATH }}/export_presets.cfg"; then
            echo "ERROR: placeholder not replaced — check ANDROID_KEY_ALIAS / ANDROID_KEY_PASS secrets."
            exit 1
          fi
          echo "=== keystore lines in export_presets.cfg ==="
          grep "keystore/" "${{ env.PROJECT_PATH }}/export_presets.cfg"

      # ── Pre-export diagnostics ───────────────────────────────────────────
      - name: Pre-export diagnostics
        run: |
          echo "=== Android export templates ==="
          ls "${HOME}/.local/share/godot/export_templates/4.6.stable/" \
            | grep -i android

          echo "=== Build-tools versions present ==="
          ls "${SDK_ROOT}/build-tools/" 2>/dev/null \
            || echo "WARNING: no build-tools directory found"

          echo "=== apksigner ==="
          find "${SDK_ROOT}/build-tools" -name "apksigner" 2>/dev/null | head -3

          echo "=== platform-tools/adb ==="
          ls -l "${SDK_ROOT}/platform-tools/adb" 2>/dev/null \
            || echo "WARNING: adb not at expected path"

          echo "=== jarsigner ==="
          which jarsigner 2>/dev/null || echo "WARNING: jarsigner not found"

          echo "=== /tmp/release.keystore ==="
          ls -l /tmp/release.keystore

          echo "=== export_presets.cfg keystore section ==="
          grep "keystore" "${{ env.PROJECT_PATH }}/export_presets.cfg"

      # ── Export ──────────────────────────────────────────────────────────
      - name: Export Android APK
        env:
          ANDROID_HOME: ${{ env.SDK_ROOT }}
        run: |
          mkdir -p build/android
          godot -v --headless \
            --path "${{ env.PROJECT_PATH }}" \
            --export-release "Android" \
            "build/android/MonarchGame.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonarchGame-android-apk
          path: build/android/MonarchGame.apk
          retention-days: 30

# ── iOS ──────────────────────────────────────────────────────────────────
# Restore from git history when Apple Developer Program is active and
# IOS_ secrets have been added to the repository.
