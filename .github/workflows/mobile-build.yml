name: "Mobile Build"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6"
  PROJECT_PATH: "src/monarch-game"

jobs:
  export-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget zip unzip libfontconfig1 libxcursor1 \
            libxinerama1 libxrandr2 libxi6 libgl1 libasound2t64 libpulse0 \
            libdbus-1-3 libudev1

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Required SDK Packages
        run: sdkmanager "build-tools;35.0.1" "platforms;android-35"

      - name: Install Godot Engine
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 755 "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot

      - name: Install Godot Export Templates
        run: |
          TEMPLATES_DIR="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "${TEMPLATES_DIR}"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates_extract
          mv /tmp/templates_extract/templates/* "${TEMPLATES_DIR}/"

      - name: Write Godot Editor Settings
        run: |
          mkdir -p "${HOME}/.config/godot"
          { printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\n'
            printf 'export/android/android_sdk_path = "%s"\n' "${ANDROID_HOME}"
            printf 'export/android/java_sdk_path = "%s"\n' "${JAVA_HOME}"
            printf 'export/android/debug_keystore = "%s/.android/debug.keystore"\n' "${HOME}"
            printf 'export/android/debug_keystore_user = "androiddebugkey"\n'
            printf 'export/android/debug_keystore_pass = "android"\n'
          } > "${HOME}/.config/godot/editor_settings-4.tres"

      - name: Create Debug Keystore
        run: |
          mkdir -p "${HOME}/.android"
          keytool -genkey -v \
            -keystore "${HOME}/.android/debug.keystore" \
            -alias androiddebugkey \
            -storepass android -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Write Release Keystore
        run: |
          echo "${{ secrets.RAW_KEYSTORE }}" | base64 -d > "${{ github.workspace }}/${{ env.PROJECT_PATH }}/release.keystore"

      - name: Inject Keystore Credentials
        env:
          _KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          _KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
        run: |
          python3 - <<'PYEOF'
          import os
          cfg = os.path.join(os.environ['PROJECT_PATH'], 'export_presets.cfg')
          alias = os.environ.get('_KEY_ALIAS', '')
          passwd = os.environ.get('_KEY_PASS', '')
          with open(cfg) as f:
              content = f.read()
          content = content.replace('CI_KEY_ALIAS', alias)
          content = content.replace('CI_KEY_PASS', passwd)
          with open(cfg, 'w') as f:
              f.write(content)
          PYEOF

      - name: Export Android APK
        run: |
          mkdir -p "${{ github.workspace }}/build/android"
          godot --headless --verbose \
            --path "${{ env.PROJECT_PATH }}" \
            --export-release "Android" \
            "${{ github.workspace }}/build/android/MonarchGame.apk"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonarchGame-android-apk
          path: build/android/MonarchGame.apk
