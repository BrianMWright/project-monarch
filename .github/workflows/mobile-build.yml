# mobile-build.yml
# Builds a signed Android .aab on every push to main.
#
# Uses barichello/godot-ci Docker image — Godot, Android SDK, JDK, export
# templates, and editor settings are all pre-configured inside the image.
# This avoids the manual SDK configuration errors that occur on bare runners.
#
# ── Required GitHub Secrets ────────────────────────────────────────────────
#
#  ANDROID
#    ANDROID_KEYSTORE_BASE64   base64-encoded release keystore file
#                              Generate: base64 -i release.keystore | pbcopy
#    ANDROID_KEY_ALIAS         key alias inside the keystore
#    ANDROID_KEY_PASS          key + keystore password
#
# ── iOS (not yet active — requires Apple Developer Program, $99/yr) ────────
#  When ready, restore the build-ios job from git history and add:
#    IOS_P12_BASE64            base64-encoded Apple Distribution .p12 cert
#    IOS_P12_PASSWORD          password for the .p12
#    IOS_PROVISIONING_PROFILE_BASE64   base64-encoded .mobileprovision
#    IOS_TEAM_ID               10-character Apple Developer Team ID
#
# ── One-time setup ─────────────────────────────────────────────────────────
#  1. In Godot editor: Project → Export → confirm Android preset,
#     set bundle ID to com.monarchgame.app, save — updates export_presets.cfg.
#  2. Generate a release keystore if you haven't already:
#     keytool -genkey -v -keystore release.keystore -alias monarch \
#       -keyalg RSA -keysize 2048 -validity 10000
#  3. Add the three ANDROID_ secrets above to:
#     GitHub repo → Settings → Secrets and variables → Actions.

name: Mobile Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6"
  PROJECT_PATH: src/monarch-game

# ─────────────────────────────────────────────────────────────────────────────
# ANDROID
# Uses barichello/godot-ci which ships Godot + Android SDK + export templates
# pre-installed. No manual JDK, sdkmanager, or editor_settings setup needed.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-android:
    name: Android (.aab)
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      # ── Environment fix ───────────────────────────────────────────────────
      # GitHub Actions sets $HOME to /github/home inside containers, not /root.
      # The Docker image's pre-installed templates and editor_settings live
      # under /root — Godot won't find them. We re-install/re-write everything
      # under $HOME so both GitHub Actions and Godot agree on the same path.

      - name: Install export templates
        run: |
          TEMPLATES_DIR="${HOME}/.local/share/godot/export_templates/4.6.stable"
          mkdir -p "${TEMPLATES_DIR}"
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz" \
            -O templates.tpz
          unzip -q templates.tpz -d templates_extract
          mv templates_extract/templates/* "${TEMPLATES_DIR}/"
          echo "Android templates installed:"
          ls "${TEMPLATES_DIR}/" | grep android

      - name: Write Godot editor settings
        run: |
          # Find the JDK home — resolves symlinks so Godot gets the real path.
          JAVA_PATH="$(readlink -f "$(which java)" | sed 's|/bin/java||')"
          mkdir -p "${HOME}/.config/godot"
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/android_sdk_path = "/root/android-sdk"\nexport/android/java_sdk_path = "%s"\nexport/android/debug_keystore = "/root/.android/debug.keystore"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\n' \
            "${JAVA_PATH}" > "${HOME}/.config/godot/editor_settings-4.tres"
          echo "=== editor_settings-4.tres ==="
          cat "${HOME}/.config/godot/editor_settings-4.tres"

      - name: Start ADB daemon
        run: /root/android-sdk/platform-tools/adb start-server

      # ── Keystore ──────────────────────────────────────────────────────────
      # Written to res:// (project root) so export_presets.cfg can resolve it.
      # This file is in .gitignore and never committed.
      - name: Write release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > "${{ env.PROJECT_PATH }}/release.keystore"

      # Replace the CI_KEY_ALIAS / CI_KEY_PASS placeholders committed in
      # export_presets.cfg with the real secret values.
      - name: Inject keystore credentials
        run: |
          sed -i \
            "s|CI_KEY_ALIAS|${{ secrets.ANDROID_KEY_ALIAS }}|g" \
            "${{ env.PROJECT_PATH }}/export_presets.cfg"
          sed -i \
            "s|CI_KEY_PASS|${{ secrets.ANDROID_KEY_PASS }}|g" \
            "${{ env.PROJECT_PATH }}/export_presets.cfg"

      # ── Export ────────────────────────────────────────────────────────────
      - name: Create output directory
        run: mkdir -p build/android

      - name: Export Android AAB
        run: |
          godot --headless \
            --path "$GITHUB_WORKSPACE/${{ env.PROJECT_PATH }}" \
            --export-release "Android" \
            "$GITHUB_WORKSPACE/build/android/MonarchGame.aab"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonarchGame-android-aab
          path: build/android/MonarchGame.aab
          retention-days: 30

# ── iOS job removed — restore from git history when Apple Developer Program
# is active and IOS_ secrets have been added to the repository.
