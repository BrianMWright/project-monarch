name: "Mobile Build"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.2"
  PROJECT_PATH: "src/monarch-game"
  EXPORT_NAME: "MonarchGame"

jobs:
  export-android:
    name: Android (.apk)
    runs-on: ubuntu-latest

    container:
      image: docker.io/barichello/godot-ci:4.6.2

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Godot paths
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          mkdir -p ~/.config/godot

          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" ]; then
            cp -r "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" \
              "~/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          fi

          if [ -f /root/.config/godot/editor_settings-4.6.tres ]; then
            cp /root/.config/godot/editor_settings-4.6.tres ~/.config/godot/editor_settings-4.6.tres
          fi

          if [ -f /root/.config/godot/editor_settings-4.tres ]; then
            cp /root/.config/godot/editor_settings-4.tres ~/.config/godot/editor_settings-4.tres
          fi

      - name: Prepare keystores
        run: |
          mkdir -p "${PROJECT_PATH}"
          mkdir -p "${HOME}/.android"

          echo "${{ secrets.SECRET_RELEASE_KEYSTORE_BASE64 }}" | base64 -d > "${PROJECT_PATH}/release.keystore"

          keytool -genkey -v \
            -keystore "${HOME}/.android/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Patch export_presets.cfg
        env:
          KEY_ALIAS: ${{ secrets.SECRET_RELEASE_KEYSTORE_USER }}
          KEY_PASS: ${{ secrets.SECRET_RELEASE_KEYSTORE_PASSWORD }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path("src/monarch-game/export_presets.cfg")
          text = p.read_text(encoding="utf-8")

          text = text.replace('keystore/release="res://release.keystore"', 'keystore/release="res://release.keystore"')
          text = text.replace('keystore/release_user="CI_KEY_ALIAS"', f'keystore/release_user="{__import__("os").environ["KEY_ALIAS"]}"')
          text = text.replace('keystore/release_password="CI_KEY_PASS"', f'keystore/release_password="{__import__("os").environ["KEY_PASS"]}"')

          text = text.replace('gradle_build/min_sdk="21"', 'gradle_build/min_sdk=""')
          text = text.replace('gradle_build/target_sdk="35"', 'gradle_build/target_sdk=""')
          text = text.replace('export_path="../../build/android/MonarchGame.apk"', 'export_path=""')

          if 'version/code=1' not in text.split('[preset.0.options]')[0]:
              text = text.replace('version/name="0.1.0"', 'version/name="0.1.0"\nversion/code=1', 1)

          p.write_text(text, encoding="utf-8")
          PY

      - name: Verify preset
        run: |
          sed -n '/\[preset\.0\]/,/\[preset\.1\]/p' "${PROJECT_PATH}/export_presets.cfg"

      - name: Import project
        run: |
          godot --headless --path "${PROJECT_PATH}" --import

      - name: Export Android APK
        run: |
          mkdir -p build/android
          godot --headless \
            --path "${PROJECT_PATH}" \
            --export-release "Android" \
            "build/android/${EXPORT_NAME}.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: monarchgame-android-apk
          path: build/android/${{ env.EXPORT_NAME }}.apk
          retention-days: 30