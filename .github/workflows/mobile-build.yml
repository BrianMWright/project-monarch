# mobile-build.yml
# Builds a signed Android .aab on every push to main.
#
# Uses barichello/godot-ci Docker image — Godot, Android SDK, JDK, export
# templates, and editor settings are all pre-configured inside the image.
# This avoids the manual SDK configuration errors that occur on bare runners.
#
# ── Required GitHub Secrets ────────────────────────────────────────────────
#
#  ANDROID
#    ANDROID_KEYSTORE_BASE64   base64-encoded release keystore file
#                              Generate: base64 -i release.keystore | pbcopy
#    ANDROID_KEY_ALIAS         key alias inside the keystore
#    ANDROID_KEY_PASS          key + keystore password
#
# ── iOS (not yet active — requires Apple Developer Program, $99/yr) ────────
#  When ready, restore the build-ios job from git history and add:
#    IOS_P12_BASE64            base64-encoded Apple Distribution .p12 cert
#    IOS_P12_PASSWORD          password for the .p12
#    IOS_PROVISIONING_PROFILE_BASE64   base64-encoded .mobileprovision
#    IOS_TEAM_ID               10-character Apple Developer Team ID
#
# ── One-time setup ─────────────────────────────────────────────────────────
#  1. In Godot editor: Project → Export → confirm Android preset,
#     set bundle ID to com.monarchgame.app, save — updates export_presets.cfg.
#  2. Generate a release keystore if you haven't already:
#     keytool -genkey -v -keystore release.keystore -alias monarch \
#       -keyalg RSA -keysize 2048 -validity 10000
#  3. Add the three ANDROID_ secrets above to:
#     GitHub repo → Settings → Secrets and variables → Actions.

name: Mobile Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6"
  PROJECT_PATH: src/monarch-game

# ─────────────────────────────────────────────────────────────────────────────
# ANDROID
# Uses barichello/godot-ci which ships Godot + Android SDK + export templates
# pre-installed. No manual JDK, sdkmanager, or editor_settings setup needed.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-android:
    name: Android (.aab)
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      # ── Environment fix ───────────────────────────────────────────────────
      # GitHub Actions sets $HOME to /github/home inside containers, not /root.
      # The Docker image's pre-installed templates and editor_settings live
      # under /root — Godot won't find them. We re-install/re-write everything
      # under $HOME so both GitHub Actions and Godot agree on the same path.

      # Install build-tools 34 so Godot stops warning about a version mismatch.
      # Search for sdkmanager rather than hardcoding a version subdir (latest,
      # 9.0, etc. all vary between Docker image versions).
      
      - name: Install Missing Linux Libraries
        run: |
          apt-get update
          apt-get install -y \
            libfontconfig1 \
            libxcursor1 \
            libxinerama1 \
            libxi6 \
            libvulkan1 \
            python3 \
            libxrandr-dev || apt-get install -y libxrandr2

      - name: Install Android build-tools 34
        run: |
          SDKMANAGER="$(find "${SDK_ROOT}/cmdline-tools" -name sdkmanager -type f 2>/dev/null | head -1)"
          if [ -n "${SDKMANAGER}" ]; then
            echo "Found sdkmanager at: ${SDKMANAGER}"
            echo "yes" | "${SDKMANAGER}" "build-tools;34.0.0" "platforms;android-34"
          else
            echo "sdkmanager not found under ${SDK_ROOT}/cmdline-tools — skipping"
          fi

      - name: Install export templates
        run: |
          TEMPLATES_DIR="${HOME}/.local/share/godot/export_templates/4.6.stable"
          mkdir -p "${TEMPLATES_DIR}"
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz" \
            -O templates.tpz
          unzip -q templates.tpz -d templates_extract
          mv templates_extract/templates/* "${TEMPLATES_DIR}/"
          echo "Android templates installed:"
          ls "${TEMPLATES_DIR}/" | grep android

      - name: Locate Android SDK and write Godot editor settings
        run: |
          # Discover the real SDK root — env vars differ across image versions.
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "${SDK_ROOT}" ]; then
            SDK_ROOT="$(dirname "$(dirname "$(find /root /usr/local /opt -name 'adb' -type f 2>/dev/null | head -1)")")"
          fi
          echo "SDK_ROOT=${SDK_ROOT}"

          # Find the JDK home — resolves symlinks so Godot gets the real path.
          JAVA_PATH="$(readlink -f "$(which java)" | sed 's|/bin/java||')"
          echo "JAVA_PATH=${JAVA_PATH}"

          # Locate the debug keystore the image pre-generates.
          DEBUG_KS="$(find /root /github -name 'debug.keystore' -type f 2>/dev/null | head -1)"
          DEBUG_KS="${DEBUG_KS:-/root/.android/debug.keystore}"
          echo "DEBUG_KS=${DEBUG_KS}"

          mkdir -p "${HOME}/.config/godot"
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/java_sdk_path = "%s"\nexport/android/debug_keystore = "%s"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\n' \
            "${SDK_ROOT}" "${JAVA_PATH}" "${DEBUG_KS}" \
            > "${HOME}/.config/godot/editor_settings-4.tres"
          echo "=== editor_settings-4.tres ==="
          cat "${HOME}/.config/godot/editor_settings-4.tres"

          # Persist SDK_ROOT for the ADB step.
          echo "SDK_ROOT=${SDK_ROOT}" >> "${GITHUB_ENV}"

      - name: Start ADB daemon
        run: |
          ADB="${SDK_ROOT}/platform-tools/adb"
          echo "Starting ADB at: ${ADB}"
          "${ADB}" start-server

      # ── Keystore ──────────────────────────────────────────────────────────
      # Written to /tmp (absolute path) so Godot can find it without res://
      # resolution, which is unreliable inside a Docker container.
      - name: Write and verify release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.keystore
          # Verify the keystore decoded correctly — fails fast if base64 is bad.
          keytool -list \
            -keystore /tmp/release.keystore \
            -storepass "${{ secrets.ANDROID_KEY_PASS }}" \
            -noprompt
          echo "Keystore OK — $(stat -c%s /tmp/release.keystore) bytes"

      # Patch export_presets.cfg:
      #   1. Point keystore/release at the absolute /tmp path.
      #   2. Replace CI_KEY_ALIAS / CI_KEY_PASS placeholders with real secrets.
      # Python is used instead of sed so passwords containing $, !, & or other
      # shell-special characters are never interpreted by the shell.
      - name: Inject keystore path and credentials
        env:
          _KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          _KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
        run: |
          python3 - <<'PYEOF'
          import os
          cfg = os.environ['PROJECT_PATH'] + '/export_presets.cfg'
          alias = os.environ['_KEY_ALIAS']
          passwd = os.environ['_KEY_PASS']
          with open(cfg) as f:
              content = f.read()
          content = content.replace('res://release.keystore', '/tmp/release.keystore')
          content = content.replace('CI_KEY_ALIAS', alias)
          content = content.replace('CI_KEY_PASS', passwd)
          with open(cfg, 'w') as f:
              f.write(content)
          print("Patched export_presets.cfg")
          PYEOF
          # Fail loudly if any placeholder survived (secret not set / wrong name).
          if grep -qE "CI_KEY_ALIAS|CI_KEY_PASS" "${{ env.PROJECT_PATH }}/export_presets.cfg"; then
            echo "ERROR: Placeholder not replaced — check ANDROID_KEY_ALIAS / ANDROID_KEY_PASS secrets."
            exit 1
          fi
          echo "export_presets.cfg keystore lines:"
          grep "keystore/" "${{ env.PROJECT_PATH }}/export_presets.cfg"

      # ── Export ────────────────────────────────────────────────────────────
      - name: Create output directory
        run: mkdir -p build/android

      - name: Debug Environment
        run: |
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          echo "PWD=$(pwd)"
          ls -R "${{ env.PROJECT_PATH }}"
          echo "Checking for keystore at /tmp:"
          ls -l /tmp/release.keystore

      - name: Export Android AAB
        env:
          ANDROID_HOME: ${{ env.SDK_ROOT }}
        run: |
          mkdir -p build/android
          # We use -v to catch any remaining hidden errors
          godot -v --headless \
            --path "${{ env.PROJECT_PATH }}" \
            --export-release "Android" \
            "build/android/MonarchGame.apk"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonarchGame-android-apk
          path: build/android/MonarchGame.apk
          retention-days: 30

# ── iOS job removed — restore from git history when Apple Developer Program
# is active and IOS_ secrets have been added to the repository.
