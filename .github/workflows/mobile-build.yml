name: "Mobile Build"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  GODOT_VERSION: "4.6"
  PROJECT_PATH: "src/monarch-game"

jobs:
  export-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget zip unzip libfontconfig1 libxcursor1 libxinerama1 libxrandr1 libxi6 libgl1-mesa-dev libglu1-mesa-dev libasound2 libpulse0 libdbus-1-3 libudev1

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Godot Engine
        run: |
          wget https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip
          unzip Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip
          sudo mv Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Install Godot Export Templates
        run: |
          wget https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          unzip Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          mv ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/
          rm -rf ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/templates

      - name: Write Hardcoded Keystore
        run: |
          # Decoding the string you provided directly into the project folder
          echo "${{ env.RAW_KEYSTORE }}" | base64 --decode > "${{ github.workspace }}/${{ env.PROJECT_PATH }}/release.keystore"
        env:
          RAW_KEYSTORE: ""

      - name: Export Android APK
        env:
          # Use the SDK path provided by the setup-android action
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          # Force Godot to use the physical file we just created via absolute path
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: "${{ github.workspace }}/${{ env.PROJECT_PATH }}/release.keystore"
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: "${{ secrets.ANDROID_KEY_ALIAS }}"
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: "${{ secrets.ANDROID_KEY_PASS }}"
        run: |
          mkdir -p build/android
          godot --headless --verbose \
            --path "${{ env.PROJECT_PATH }}" \
            --export-release "Android" \
            "${{ github.workspace }}/build/android/MonarchGame.apk"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonarchGame-android-apk
          path: build/android/MonarchGame.apk