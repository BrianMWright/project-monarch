; export_presets.cfg
; Godot 4 export configuration for Project Monarch.
;
; SECURITY: This file is safe to commit.
;   - Keystore credentials use CI_KEY_ALIAS / CI_KEY_PASS placeholders.
;   - The CI workflow replaces them at build time using GitHub Secrets.
;   - release.keystore is written by CI and is listed in .gitignore.
;
; BUNDLE ID: Update com.monarchgame.app before submitting to any store.

[preset.0]

name="Android"
platform="Android"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="../../build/android/MonarchGame.aab"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false

[preset.0.options]

custom_template/debug=""
custom_template/release=""
gradle_build/use_gradle_build=false
gradle_build/gradle_build_directory=""
gradle_build/android_source_template=""
architectures/armeabi-v7a=false
architectures/arm64-v8a=true
architectures/x86=false
architectures/x86_64=false
keystore/debug=""
keystore/debug_user=""
keystore/debug_password=""
keystore/release="res://release.keystore"
keystore/release_user="CI_KEY_ALIAS"
keystore/release_password="CI_KEY_PASS"
package/unique_name="com.monarchgame.app"
package/name="MonarchGame"
package/signed=true
package/classify_as_game=true
package/retain_data_on_uninstall=false
package/exclude_from_recents=false
package/show_in_android_tv=false
package/show_as_launcher_app=false
package/show_in_app_library=false
package/export_format=1
screen/immersive_mode=true
screen/orientation=6
permissions/internet=true
permissions/access_network_state=true
permissions/access_wifi_state=true

[preset.1]

name="iOS"
platform="iOS"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="../../build/ios/MonarchGame.xcodeproj"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false

[preset.1.options]

custom_template/debug=""
custom_template/release=""
application/bundle_identifier="com.monarchgame.app"
application/signature=""
application/short_version="0.1.0"
application/version="1"
application/icon_interpolation=4
application/launch_screens_interpolation=4
capabilities/access_wifi=false
capabilities/push_notifications=false
